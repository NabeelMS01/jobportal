

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobportal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobportal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/jobportal?schema=public
      - JWT_SECRET=supersecretjwtkey
      - CLIENT_URL=http://localhost:5173
      - PORT=5001
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./server/src:/usr/src/app/src
      - ./server/prisma:/usr/src/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001
    volumes:
      - ./client/src:/usr/src/app/src
      - ./client/public:/usr/src/app/public
    depends_on:
      - server

volumes:
  postgres_data:
